version: "3.8"

services:
  vinted-notifier:
    image: python:3.12-slim
    container_name: vinted-notifier
    restart: unless-stopped
    working_dir: /app
    volumes:
      - /DATA/AppData/vinted-notifier/vinted_notifier:/app
    env_file:
      - /DATA/AppData/vinted-notifier/vinted_notifier/.env
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python /app/main.py"
